# ==============================================================================
# Model: Qwen3.6-35B-A3B (Service: llama-qwen)
# CCD Optimization: CCD0 (V-Cache 0-7) for logic/branch heavy MoE 
# Deep-Dive Analysis: 256 experts (64 on GPU). 3.5-bit weights.
# ==============================================================================

SERVICE_NAME="llama-qwen.service"
MODEL_PATH="/home/siva/models/Qwen3.6-35B-A3B/mudler/Qwen3.6-35B-A3B-APEX-I-Balanced.gguf"
MMPRJ_PATH="/home/siva/models/Qwen3.6-35B-A3B/mudler/mmproj.gguf"
MODEL_ALIAS="Qwen3.6-35B-A3B"

# --- COMPUTE (CCD0 Focus) ---
CPU_AFFINITY="0-7,24-31"
THREADS=16
THREADS_BATCH=16
N_GPU_LAYERS=999
# Balanced offloading for 16GB VRAM: 192 experts on CPU (64 on GPU).
N_CPU_MOE=36
UBATCH_SIZE=1024
MLOCK=true


# --- MEMORY ---
# Using q8_0 cache for higher precision
CACHE_TYPE_K="q8_0"
CACHE_TYPE_V="q8_0"
# Extreme-context mode: 256K context
CTX_SIZE=262144
PARALLEL=2
PORT=8080

# --- INFRASTRUCTURE ---
JINJA=true

# --- SPEC-SPECIFIC PARAMS ---
# Standard reasoning configuration
REASONING="on"
REASONING_BUDGET=512
REASONING_FORMAT="auto"
REASONING_BUDGET_MESSAGE=" [Logic Finalized] "

# Sampling for General Thinking (Official Qwen 3.6 Specs)
TEMP=1.0
MIN_P=0.0
TOP_P=0.95
TOP_K=20
REPEAT_PENALTY=1.0
REPEAT_LAST_N=128
PRESENCE_PENALTY=1.5
DRY_MULTIPLIER=0.8
DRY_BASE=1.75
DRY_ALLOWED_LENGTH=2
DRY_PENALTY_LAST_N=4096
SAMPLERS="dry;top_k;top_p;min_p;temperature"

# EXTRA ARGS (As verified by user)
EXTRA_ARGS="--grammar-file /home/siva/github-sources/llama.cpp/scripts-local/qwen-thinking.gbnf"
