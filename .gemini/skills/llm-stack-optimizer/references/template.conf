# Configuration for {{model_name}}
# Optimized for: AMD 7950X3D | RTX 4070 Ti Super (16GB) | CachyOS

# --- PATHS ---
MODEL_PATH="{{model_path}}"
MMPRJ_PATH="{{mmproj_path}}"
SERVICE_NAME="llama-server.service"

# --- HARDWARE ---
CPU_AFFINITY="0-15"
THREADS=16
N_GPU_LAYERS=999
N_CPU_MOE={{n_cpu_moe}}

# --- MEMORY ---
CACHE_TYPE_K="{{cache_type_k}}"
CACHE_TYPE_V="{{cache_type_v}}"
CTX_SIZE={{ctx_size}}
PARALLEL={{parallel}}
CACHE_RAM=32768
BATCH_SIZE=2048
UBATCH_SIZE=2048

# --- SAMPLING ---
TEMP={{temperature}}
MIN_P={{min_p}}
XTC_PROBABILITY={{xtc_prob}}
XTC_THRESHOLD={{xtc_thresh}}
TOP_P=0.95
TOP_K=50
REPEAT_PENALTY=1.05
REPEAT_LAST_N=64

# --- DRY SAMPLER ---
DRY_MULTIPLIER={{dry_mult}}
DRY_BASE=1.75
DRY_ALLOWED_LENGTH=2
DRY_PENALTY_LAST_N=4096

# --- INFRASTRUCTURE ---
REASONING_BUDGET=-1
REASONING_BUDGET_MESSAGE=" [Thinking budget reached, concluding logic...] "
HOST="0.0.0.0"
PORT=8080
SLEEP_IDLE_SECONDS=300
